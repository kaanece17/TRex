project:
  name: us_large_cap_software_quality_op_growth
  timezone: America/New_York

data:
  storage: duckdb
  duckdb_path: data/us_large_cap_tech_backtest.duckdb
  price_symbol_suffix:
  sec_user_agent: "TRex Research ops@trex.local"
  price_preload_start: "2019-12-01"
  financial_preload_start: "2018-01-01"

universe:
  name: US_LARGE_CAP_SOFTWARE
  source: csv
  symbols_file: data/universe/us_large_cap_software_symbols.csv
  membership_file: data/universe/us_large_cap_software_membership.csv
  monthly_snapshot_file:
  symbol_aliases_file: data/universe/us_symbol_aliases.csv
  mode: current_static
  fallback_mode: current_static
  target_index: SP500_SOFTWARE
  target_group: subindustry
  reconstruction_required: false

point_in_time:
  cutoff_mode: market_open
  if_only_date_available: previous_day_only

strategy:
  top_n: 5
  hold_buffer_rank:
  regime_filter_mode:
  regime_filter_top_n:
  regime_filter_lookback_days: 200
  regime_filter_breadth_threshold: 0.5
  rebalance_frequency: monthly
  rebalance_day: first_trading_day
  rebalance_time: market_open
  market_open_time: "09:30"
  buy_rule: first_trading_day_open
  sell_rule: last_trading_day_open
  execution_mode: rebalance_open_to_open
  weighting: score_weight_capped
  score_weight_cap: 0.35
  if_less_than_top_n: use_available

scoring:
  formula: quality_plus_op_growth
  use_ttm: true
  firm_value_mode: market_cap
  growth_mode: raw
  x1_weight: 1.0
  x2_weight: 1.0
  earnings_weight: 1.0
  x1_cap_quantile: 0.95
  x2_cap_quantile: 0.95

costs:
  commission_rate: 0.003

filters:
  require_positive_equity: true
  require_positive_net_income_ttm: true
  require_positive_previous_net_income_ttm: true
  require_positive_operating_profit_ttm: true
  require_positive_firm_value: true
  require_shares_outstanding: true
  min_market_cap: 10000000000
  max_net_income_to_equity:
  x1_dominant_share_threshold: 0.90
  recent_return_20d_threshold: 0.0
  min_recent_return_20d: 0.0
  min_avg_turnover_20d: 100000000

backtest:
  start_date: "2020-01-01"
  end_date: "2026-12-31"
  initial_capital: 100000
